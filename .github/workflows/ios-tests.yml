name: iOS

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  # Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 30

    env:
      SCHEME: WardrobeReDo
      # No OS pin — pick whatever iOS runtime the runner ships with.
      # The CLAUDE.md default is iPhone 17 Pro, but runners lag Apple's releases;
      # iPhone 16 Pro is always present on macos-15.
      DESTINATION: platform=iOS Simulator,name=iPhone 16 Pro

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode
        # macos-15 ships Xcode 16.x at this path by default.
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version
          echo "--- installed simulator runtimes ---"
          xcrun simctl list runtimes | cat

      - name: Ensure iOS simulator runtime is installed
        # macos-15 runners ship Xcode 16 but not always a matching iOS
        # simulator runtime. `-downloadPlatform iOS` is a no-op when the
        # latest iOS runtime is already present and pulls it otherwise.
        run: sudo xcodebuild -downloadPlatform iOS

      - name: Show installed simulators after download
        run: xcrun simctl list devices available | grep -E 'iPhone 1[5-9]' | head -10

      - name: Cache SwiftPM artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/*.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "$DESTINATION" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "$DESTINATION" \
            -derivedDataPath build \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test result bundle on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: TestResults-${{ github.run_id }}
          path: TestResults.xcresult
          retention-days: 7
