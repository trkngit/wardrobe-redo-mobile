name: WardrobeReDo
options:
  bundleIdPrefix: com.digitalatelier
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - tr
    - Base

settings:
  base:
    DEVELOPMENT_TEAM: "SCX8LHNYXZ"
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    ENABLE_MODULE_VERIFIER: YES
    MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu17 gnu++20"
    LOCALIZED_STRING_MACRO_NAMES: "$(inherited) NSLocalizedString CFCopyLocalizedString"
    SWIFT_EMIT_LOC_STRINGS: YES

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    majorVersion: 2.0.0
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    majorVersion: 8.0.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    majorVersion: 8.0.0
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    majorVersion: 1.19.2

targets:
  WardrobeReDo:
    type: application
    platform: iOS
    sources:
      - WardrobeReDo
    resources:
      - path: WardrobeReDo/Resources
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        INFOPLIST_FILE: WardrobeReDo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.digitalatelier.wardroberedo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "SCX8LHNYXZ"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Kingfisher
      - package: Sentry
        product: Sentry
      - sdk: AuthenticationServices.framework
      - target: WardrobeReDoWidget
    # Build 37 — Sign In with Apple + App Groups capabilities are
    # enabled on the App ID at developer.apple.com (Sign In with
    # Apple + group.com.digitalatelier.wardroberedo), the Supabase
    # Apple provider is configured with Client ID
    # com.digitalatelier.wardroberedo, and the LoginView flag
    # appleSignInAvailable was flipped to true. Attaching the
    # entitlements file here was the last step needed for the
    # button to actually authenticate. See
    # docs/runbooks/apple-sign-in-setup.md for the dashboard config.
    entitlements:
      path: WardrobeReDo/WardrobeReDo.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.com.digitalatelier.wardroberedo
    info:
      path: WardrobeReDo/Info.plist
      properties:
        CFBundleName: Wardrobe
        CFBundleDisplayName: Wardrobe
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "43"
        UILaunchScreen:
          UIColorName: ""
        UIAppFonts:
          - CormorantGaramond-SemiBold.ttf
          - CormorantGaramond-Medium.ttf
          - CormorantGaramond-Regular.ttf
        NSPhotoLibraryUsageDescription: "Wardrobe needs access to your photos to add clothing items to your wardrobe."
        NSCameraUsageDescription: "Wardrobe can use your camera to photograph clothing items directly."
        ITSAppUsesNonExemptEncryption: false

  WardrobeReDoWidget:
    type: app-extension
    platform: iOS
    sources:
      - WardrobeReDoWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digitalatelier.wardroberedo.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "43"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: WardrobeReDoWidget/Info.plist
    entitlements:
      path: WardrobeReDoWidget/WardrobeReDoWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.digitalatelier.wardroberedo
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  WardrobeReDoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WardrobeReDoTests
    dependencies:
      - target: WardrobeReDo
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

  WardrobeReDoIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WardrobeReDoIntegrationTests
      # Integration tests re-use the same fixtures, mocks, and isolation
      # helpers as the unit target. Duplicating them would drift;
      # including the helper directory gives the target access to
      # TestFixtures + MockWardrobeRepository + friends without a
      # separate copy. The explicit `group` keeps the file references
      # in a single virtual group rather than being claimed by both
      # WardrobeReDoTests and the implicit empty group at project
      # root — clearing the "malformed project" warning xcodegen
      # emitted on every regeneration prior to build 7.
      - path: WardrobeReDoTests/Helpers
        group: WardrobeReDoTests
    dependencies:
      - target: WardrobeReDo
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

# Test plans (D2 of build-7 hardening). Three-plan split:
#   * `All`         — full suite, runs everything (matches pre-build-7
#                     behaviour). `defaultPlan: true` so plain
#                     `xcodebuild test` keeps working without -testPlan.
#   * `Fast`        — unit + service tests, skips three slow suites:
#                     RFDETR real-model inference (~26 s), large-image
#                     stress (~24 s), EXIF orientation invariance
#                     (~29 s). Runs in ~46 s. The dev inner loop —
#                     `xcodebuild test -testPlan Fast`.
#   * `Integration` — the slow suites + `WardrobeReDoIntegrationTests`
#                     target. Runs in ~110 s. CI gate —
#                     `xcodebuild test -testPlan Integration`.
schemes:
  WardrobeReDo:
    build:
      targets:
        WardrobeReDo: all
        WardrobeReDoWidget: all
    run:
      config: Debug
    test:
      config: Debug
      testPlans:
        - path: Tests/Plans/All.xctestplan
          defaultPlan: true
        - path: Tests/Plans/Fast.xctestplan
        - path: Tests/Plans/Integration.xctestplan
      gatherCoverageData: false
      parallelizeBuild: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
